<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Sharp Sharp</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

h1 {
    text-align: center;
}

.order {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.order h3 {
    margin: 0;
    color: #333;
}

.order p {
    margin: 5px 0;
}
</style>

</head>

<body>

<h1>📦 Sharp Sharp Orders Dashboard</h1>

<div id="orders"></div>

<script>

async function loadOrders() {
    try {
        const res = await fetch("http://localhost:5000/api/orders");
        const data = await res.json();

        const container = document.getElementById("orders");
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = "<p>No orders yet.</p>";
            return;
        }

        data.forEach(order => {
            container.innerHTML += `
                <div class="order">
                    <h3>📧 ${order.customerEmail}</h3>
                    <p><b>Total:</b> ₦${order.total}</p>
                    <p><b>Reference:</b> ${order.paymentReference || "N/A"}</p>
                    <pre>${JSON.stringify(order.orderItems, null, 2)}</pre>
                    <p><b>Status:</b> ${order.status}</p>
                </div>
            `;
        });

    } catch (err) {
        console.error("Error loading orders:", err);
    }
}

// Step 2 in action 👇
loadOrders();

// auto refresh every 5 seconds
setInterval(loadOrders, 5000);

</script>

</body>
</html>
